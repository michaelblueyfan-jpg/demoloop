<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="app_icon.png">
    
    <title>DemoLoop</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            /* Fixes the iOS black-translucent 'chin gap' by forcing true viewport height */
            height: 100vh; 
            height: 100dvh;
            overflow: hidden;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="loopVideo">
        <source src="IPhone.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('loopVideo');
            video.play().catch(error => {
                console.log("Autoplay prevented. Tap anywhere to play.");
                document.addEventListener('click', () => { video.play(); }, { once: true });
            });
        });
    </script>
</body>
</html>
