<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="app_icon.png">
    
    <title>DemoLoop</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100vh; 
            overflow: hidden;
            background-color: #000;
            -webkit-user-select: none;
            user-select: none;
        }
        video {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="loopVideo">
        <source src="IPhone.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('loopVideo');
            
            // Autoplay logic
            video.play().catch(error => {
                console.log("Autoplay prevented.");
            });

            // Tap anywhere to close via window trick
            document.body.addEventListener('touchstart', () => {
                // 1. Trick Safari into thinking this window was opened by a script
                window.open('', '_self');
                
                // 2. Immediately execute the close command
                window.close();
            }, { passive: true });
        });
    </script>
</body>
</html>
